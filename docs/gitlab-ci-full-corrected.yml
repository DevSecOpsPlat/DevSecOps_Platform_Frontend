stages:
  - hello
  - clone
  - sonarqube
  - sca-trivy          # Parallel
  - sca-owasp          # Parallel
  - sca-node           # Parallel
  - sca-python         # Parallel
  - sca-java           # Parallel
  - sast-generic       # Parallel
  - sast-angular       # Parallel
  - secrets            # Parallel  
  - container          # Parallel
  - iac                # Parallel
  - license-node       # Parallel
  - license-python     # Parallel
  - report

variables:
  GIT_REPO_URL: ""
  GIT_BRANCH: "main"
  GITHUB_TOKEN: ""
  ENVIRONMENT_ID: ""

# ========================================
# STAGE 1 : HELLO
# ========================================
hello-world:
  stage: hello
  image: alpine:latest
  script:
    - echo "🚀 EnviroTest Multi-Language Pipeline"
    - echo "Environment ID = $ENVIRONMENT_ID"
    - echo "Repository = $GIT_REPO_URL"
    - echo "Branch = $GIT_BRANCH"

# ========================================
# STAGE 2 : CLONE - Multi-Language Detection
# ========================================
clone-repository:
  stage: clone
  image: alpine:latest
  before_script:
    - apk add --no-cache git bash
  script:
    - echo "📦 Cloning repository with multi-language detection"
    - test -n "$GIT_REPO_URL" || exit 1
    
    # Clone with auth
    - |
      if [ -n "$GITHUB_TOKEN" ]; then
        AUTH_URL=$(echo "$GIT_REPO_URL" | sed "s|https://|https://oauth2:${GITHUB_TOKEN}@|")
      else
        AUTH_URL="$GIT_REPO_URL"
      fi
      git clone --depth 1 --branch "$GIT_BRANCH" "$AUTH_URL" user-repo
    
    - chmod -R 777 user-repo
    
    # Language Detection Matrix
    - echo "🔍 Detecting project languages..."
    
    # Node.js
    - test -f "user-repo/package.json" && echo "LANG_NODE=true" >> build.env && echo "  ✅ Node.js detected" || true
    
    # Python
    - test -f "user-repo/requirements.txt" && echo "LANG_PYTHON=true" >> build.env && echo "  ✅ Python detected" || true
    - test -f "user-repo/setup.py" && echo "LANG_PYTHON=true" >> build.env && echo "  ✅ Python detected" || true
    - test -f "user-repo/Pipfile" && echo "LANG_PYTHON=true" >> build.env && echo "  ✅ Python detected" || true
    
    # Java
    - test -f "user-repo/pom.xml" && echo "LANG_JAVA=true" >> build.env && echo "  ✅ Java/Maven detected" || true
    - test -f "user-repo/build.gradle" && echo "LANG_JAVA=true" >> build.env && echo "  ✅ Java/Gradle detected" || true
    
    # Go
    - test -f "user-repo/go.mod" && echo "LANG_GO=true" >> build.env && echo "  ✅ Go detected" || true
    
    # Ruby
    - test -f "user-repo/Gemfile" && echo "LANG_RUBY=true" >> build.env && echo "  ✅ Ruby detected" || true
    
    # PHP
    - test -f "user-repo/composer.json" && echo "LANG_PHP=true" >> build.env && echo "  ✅ PHP detected" || true
    
    # Rust
    - test -f "user-repo/Cargo.toml" && echo "LANG_RUST=true" >> build.env && echo "  ✅ Rust detected" || true
    
    # Framework Detection
    - |
      if [ -f "user-repo/angular.json" ]; then
        echo "FRAMEWORK=angular" >> build.env
        echo "  ✅ Angular framework detected"
      elif [ -f "user-repo/react-scripts" ] || grep -q '"react"' user-repo/package.json 2>/dev/null; then
        echo "FRAMEWORK=react" >> build.env
        echo "  ✅ React framework detected"
      elif [ -f "user-repo/vue.config.js" ]; then
        echo "FRAMEWORK=vue" >> build.env
        echo "  ✅ Vue framework detected"
      fi
    
    # Infrastructure Detection
    - test -f "user-repo/Dockerfile" && echo "HAS_DOCKERFILE=true" >> build.env && echo "  ✅ Dockerfile detected" || echo "HAS_DOCKERFILE=false" >> build.env
    
    # IaC Detection
    - |
      if find user-repo -name "*.tf" -o -name "*.yaml" -o -name "*.yml" -o -name "Dockerfile" | grep -q .; then
        echo "HAS_IAC=true" >> build.env
        echo "  ✅ IaC files detected"
      else
        echo "HAS_IAC=false" >> build.env
      fi
    
    # Summary
    - echo "📋 Build environment:"
    - cat build.env
    
  artifacts:
    paths:
      - user-repo/
    reports:
      dotenv: build.env
    expire_in: 2 hours

# ========================================
# STAGE 3 : SONARQUBE (Universal SAST) - CORRIGÉ
# ========================================
sonarqube-scan:
  stage: sonarqube
  image: sonarsource/sonar-scanner-cli:latest
  needs: ["clone-repository"]
  script:
    - echo "SonarQube Scan"
    - sonar-scanner \
        -Dsonar.projectKey="amanibennaceur-group_EnviroTest" \
        -Dsonar.organization="amanibennaceur-group" \
        -Dsonar.sources=user-repo \
        -Dsonar.host.url="https://sonarcloud.io" \
        -Dsonar.token="$SONAR_TOKEN" \
        -Dsonar.exclusions="**/node_modules/**,**/dist/**,**/target/**,**/build/**" \
        -Dsonar.coverage.exclusions="**/*.test.js,**/*.spec.js,**/test/**" || true
  allow_failure: true

# ========================================
# STAGE 4a : TRIVY (Universal SCA) - PARALLEL
# ========================================
trivy-scan:
  stage: sca-trivy
  image: alpine:latest
  needs: ["clone-repository"]
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - echo "🔍 Trivy - Universal Vulnerability Scanner"
    - mkdir -p reports/trivy
    - trivy fs --format json --output reports/trivy/trivy.json --severity CRITICAL,HIGH,MEDIUM user-repo/ || true
    - trivy fs --security-checks vuln,secret,config --format json --output reports/trivy/trivy-full.json user-repo/ || true
  artifacts:
    paths:
      - reports/trivy/
  allow_failure: true

# ========================================
# STAGE 4b : OWASP (Universal SCA) - PARALLEL
# ========================================
owasp-dependency-check:
  stage: sca-owasp
  image: alpine:latest
  needs: ["clone-repository"]
  before_script:
    - apk add --no-cache openjdk17-jre curl unzip
    - curl -sSLo dependency-check.zip https://github.com/jeremylong/DependencyCheck/releases/download/v10.0.3/dependency-check-10.0.3-release.zip
    - unzip -q dependency-check.zip
  script:
    - echo "🔍 OWASP Dependency-Check - Universal SCA"
    - mkdir -p reports/owasp
    - ./dependency-check/bin/dependency-check.sh --project "$ENVIRONMENT_ID" --format JSON --out reports/owasp --scan user-repo --enableExperimental --disableAssembly || true
  artifacts:
    paths:
      - reports/owasp/
  allow_failure: true

# ========================================
# STAGE 4c : NODE SCA - PARALLEL
# ========================================
npm-audit:
  stage: sca-node
  image: node:18-alpine
  needs: ["clone-repository"]
  rules:
    - if: $LANG_NODE == "true"
  script:
    - echo "🔍 NPM/Yarn Audit for Node.js"
    - mkdir -p reports/node
    - cd user-repo
    - |
      if [ -f "yarn.lock" ]; then
        yarn audit --json > ../reports/node/yarn-audit.json || echo '{"error":"yarn audit failed"}' > ../reports/node/yarn-audit.json
      else
        npm audit --json > ../reports/node/npm-audit.json || echo '{"error":"npm audit failed"}' > ../reports/node/npm-audit.json
        npm outdated --json > ../reports/node/npm-outdated.json || true
      fi
    - cd ..
  artifacts:
    paths:
      - reports/node/
  allow_failure: true

# ========================================
# STAGE 4d : PYTHON SCA - PARALLEL
# ========================================
pip-audit:
  stage: sca-python
  image: python:3.11-alpine
  needs: ["clone-repository"]
  rules:
    - if: $LANG_PYTHON == "true"
  before_script:
    - pip install pip-audit safety
  script:
    - echo "🔍 Python Security Audit"
    - mkdir -p reports/python
    - cd user-repo
    - |
      if [ -f "requirements.txt" ]; then
        pip-audit --requirement requirements.txt --format json > ../reports/python/pip-audit.json || true
        safety check --json --file requirements.txt --output ../reports/python/safety.json || true
      fi
    - cd ..
  artifacts:
    paths:
      - reports/python/
  allow_failure: true

# ========================================
# STAGE 4e : JAVA SCA - PARALLEL
# ========================================
maven-dependency-check:
  stage: sca-java
  image: maven:3.8-openjdk-17
  needs: ["clone-repository"]
  rules:
    - if: $LANG_JAVA == "true"
  script:
    - echo "🔍 Java/Maven Dependency Check"
    - mkdir -p reports/java
    - cd user-repo
    - |
      if [ -f "pom.xml" ]; then
        mvn dependency:tree -DoutputFile=../reports/java/dependencies.txt
        mvn org.owasp:dependency-check-maven:check -Dformat=JSON -DoutputDirectory=../reports/java/ || true
      elif [ -f "build.gradle" ]; then
        ./gradlew dependencies > ../reports/java/gradle-dependencies.txt
      fi
    - cd ..
  artifacts:
    paths:
      - reports/java/
  allow_failure: true

# ========================================
# STAGE 5a : SEMGREP (Universal SAST) - PARALLEL
# ========================================
semgrep-scan:
  stage: sast-generic
  image: returntocorp/semgrep:latest
  needs: ["clone-repository"]
  script:
    - echo "🔍 Semgrep - Universal SAST"
    - mkdir -p reports/semgrep
    - semgrep scan --config auto --json -o reports/semgrep/semgrep.json user-repo || true
    - semgrep scan --config p/security-audit --json -o reports/semgrep/security-audit.json user-repo || true
  artifacts:
    paths:
      - reports/semgrep/
  allow_failure: true

# ========================================
# STAGE 5b : SAFE (Angular/React) - PARALLEL - CORRIGÉ
# ========================================
safe-analysis:
  stage: sast-angular
  image: node:18-alpine
  needs: ["clone-repository"]
  rules:
    - if: $FRAMEWORK == "angular"
    - if: $FRAMEWORK == "react"
  script:
    - echo "🔍 SAFE - Frontend Security"
    - mkdir -p reports/sast
    - npm install -g @safe/cli || echo "⚠️ SAFE installation failed"
    
    - |
      cd user-repo
      npx @safe/cli scan:source --path . --format json > ../reports/sast/safe-report.json || echo '{"error":"SAFE failed"}' > ../reports/sast/safe-report.json
      
      if [ "$FRAMEWORK" = "angular" ] && [ -f "angular.json" ]; then
        npx ng lint --format json --output-file ../reports/sast/angular-lint.json || true
      fi
      cd ..
  artifacts:
    paths:
      - reports/sast/
  allow_failure: true

# ========================================
# STAGE 6 : GITLEAKS (Secrets) - PARALLEL
# ========================================
gitleaks-secrets:
  stage: secrets
  image: alpine:latest
  needs: ["clone-repository"]
  before_script:
    - apk add --no-cache git curl
    - curl -sSfL https://github.com/zricethezav/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz | tar xz
    - mv gitleaks /usr/local/bin/
  script:
    - echo "🔐 Gitleaks - Secrets Detection"
    - mkdir -p reports/secrets
    - gitleaks detect --source user-repo --report-path reports/secrets/gitleaks.json --report-format json --verbose || true
  artifacts:
    paths:
      - reports/secrets/
  allow_failure: true

# ========================================
# STAGE 7 : GRYPE (Container) - PARALLEL
# ========================================
grype-scan:
  stage: container
  image: docker:latest
  services:
    - docker:dind
  needs: ["clone-repository"]
  rules:
    - if: $HAS_DOCKERFILE == "true"
  before_script:
    - apk add --no-cache curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
  script:
    - echo "🐳 Grype - Container Security"
    - mkdir -p reports/container
    - cd user-repo
    - docker build -t app-image:$ENVIRONMENT_ID .
    - grype app-image:$ENVIRONMENT_ID --output json --file ../reports/container/grype.json || true
    - grype dir:. --output json --file ../reports/container/grype-dockerfile.json || true
    - cd ..
  artifacts:
    paths:
      - reports/container/
  allow_failure: true

# ========================================
# STAGE 8 : CHECKOV (IaC) - PARALLEL
# ========================================
checkov-scan:
  stage: iac
  image: python:3.11-alpine
  needs: ["clone-repository"]
  rules:
    - if: $HAS_IAC == "true"
  before_script:
    - pip install checkov
  script:
    - echo "🏗️ Checkov - IaC Security"
    - mkdir -p reports/iac
    - checkov --directory user-repo --output json --output-file-path reports/iac/checkov.json || true
  artifacts:
    paths:
      - reports/iac/
  allow_failure: true

# ========================================
# STAGE 9a : LICENSE NODE - PARALLEL
# ========================================
license-scan-node:
  stage: license-node
  image: node:18-alpine
  needs: ["clone-repository"]
  rules:
    - if: $LANG_NODE == "true"
  script:
    - echo "📋 License Scan - Node.js"
    - mkdir -p reports/license
    - npm install -g license-checker nlf
    - cd user-repo
    - license-checker --json > ../reports/license/node-licenses.json || true
    - nlf --json > ../reports/license/nlf-licenses.json || true
    - cd ..
  artifacts:
    paths:
      - reports/license/node-licenses.json
      - reports/license/nlf-licenses.json
  allow_failure: true

# ========================================
# STAGE 9b : LICENSE PYTHON - PARALLEL
# ========================================
license-scan-python:
  stage: license-python
  image: python:3.11-alpine
  needs: ["clone-repository"]
  rules:
    - if: $LANG_PYTHON == "true"
  before_script:
    - pip install pip-licenses
  script:
    - echo "📋 License Scan - Python"
    - mkdir -p reports/license
    - cd user-repo
    - |
      if [ -f "requirements.txt" ]; then
        pip install -r requirements.txt 2>/dev/null || true
        pip-licenses --format=json --output-file=../reports/license/python-licenses.json || true
      fi
    - cd ..
  artifacts:
    paths:
      - reports/license/python-licenses.json
  allow_failure: true

# ========================================
# STAGE 10 : REPORT AGGREGATION
# ========================================
aggregate-report:
  stage: report
  image: alpine:latest
  needs:
    - job: clone-repository
      artifacts: true
    - job: trivy-scan
      optional: false  # Toujours présent
    - job: owasp-dependency-check
      optional: false  # Toujours présent
    - job: npm-audit
      optional: true   # Conditionnel (LANG_NODE)
    - job: pip-audit
      optional: true   # Conditionnel (LANG_PYTHON)
    - job: maven-dependency-check
      optional: true   # Conditionnel (LANG_JAVA)
    - job: semgrep-scan
      optional: false  # Toujours présent
    - job: safe-analysis
      optional: true   # Conditionnel (FRAMEWORK)
    - job: gitleaks-secrets
      optional: false  # Toujours présent
    - job: grype-scan
      optional: true   # Conditionnel (HAS_DOCKERFILE)
    - job: checkov-scan
      optional: true   # Conditionnel (HAS_IAC)
    - job: license-scan-node
      optional: true   # Conditionnel (LANG_NODE)
    - job: license-scan-python
      optional: true   # Conditionnel (LANG_PYTHON)
  before_script:
    - apk add --no-cache curl jq
  script:
    - echo "📊 Aggregating security reports"
    - mkdir -p final-report
    
    # Vérifier si build.env existe
    - if [ -f "build.env" ]; then
        cat build.env;
        source build.env;
        echo "✅ build.env loaded";
      else
        echo "⚠️ build.env not found";
      fi
    
    # Définir les valeurs par défaut
    - LANG_NODE=${LANG_NODE:-false}
    - LANG_PYTHON=${LANG_PYTHON:-false}
    - LANG_JAVA=${LANG_JAVA:-false}
    - LANG_GO=${LANG_GO:-false}
    - LANG_RUBY=${LANG_RUBY:-false}
    - LANG_PHP=${LANG_PHP:-false}
    - LANG_RUST=${LANG_RUST:-false}
    - FRAMEWORK=${FRAMEWORK:-"unknown"}
    - HAS_DOCKERFILE=${HAS_DOCKERFILE:-false}
    - HAS_IAC=${HAS_IAC:-false}
    
    # Generate summary
    - |
      cat > final-report/summary.json << EOF
      {
        "environment_id": "$ENVIRONMENT_ID",
        "git_repository": "$GIT_REPO_URL",
        "git_branch": "$GIT_BRANCH",
        "pipeline_id": "$CI_PIPELINE_ID",
        "languages_detected": {
          "node": $LANG_NODE,
          "python": $LANG_PYTHON,
          "java": $LANG_JAVA,
          "go": $LANG_GO,
          "ruby": $LANG_RUBY,
          "php": $LANG_PHP,
          "rust": $LANG_RUST
        },
        "framework": "$FRAMEWORK",
        "has_dockerfile": $HAS_DOCKERFILE,
        "has_iac": $HAS_IAC,
        "status": "completed",
        "reports_url": "$CI_JOB_URL/artifacts"
      }
      EOF
    
    - cat final-report/summary.json
    
    # Send notification
    - echo "📧 Sending notification to backend"
    - |
      curl -X POST "${BACKEND_URL}/projet/api/deploy" \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer ${API_TOKEN}" \
        -d @final-report/summary.json || echo "⚠️ Notification failed"
    
    - echo "✅ Pipeline completed successfully"
  artifacts:
    paths:
      - reports/
      - final-report/