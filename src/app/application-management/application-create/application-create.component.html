<div class="am-modal-backdrop am-create-page-backdrop">
  <div class="am-modal">
    <h3 class="am-modal-title">Créer un projet</h3>
    <p class="am-create-lead">
      Un projet regroupe vos services et bases de données. Chaque service pourra être scanné et déployé indépendamment.
    </p>
    <app-managed-project-form
      [saving]="submitting"
      [error]="error"
      (save)="submit($event)"
      (cancel)="back()">
    </app-managed-project-form>
  </div>
</div>
