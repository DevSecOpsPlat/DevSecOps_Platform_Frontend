<div class="sign-in-page">
  <div class="sign-in-container">
    <div class="sign-in-form-panel">
      <h1>Sign in</h1>
      <p class="form-subtitle">Welcome back. Sign in to your account.</p>
      
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <form [formGroup]="formSignin" class="auth-form" (ngSubmit)="signin()">
        <div class="form-group">
          <label for="signin-username">Username</label>
          <input 
            id="signin-username" 
            type="text" 
            placeholder="Username" 
            formControlName="username"
            [class.error]="formSignin.get('username')?.invalid && formSignin.get('username')?.touched" />
          <div *ngIf="formSignin.get('username')?.invalid && formSignin.get('username')?.touched" class="field-error">
            Username is required
          </div>
        </div>
        <div class="form-group">
          <label for="signin-password">Password</label>
          <input 
            id="signin-password" 
            type="password" 
            placeholder="Password" 
            formControlName="password"
            [class.error]="formSignin.get('password')?.invalid && formSignin.get('password')?.touched" />
          <div *ngIf="formSignin.get('password')?.invalid && formSignin.get('password')?.touched" class="field-error">
            Password is required
          </div>
        </div>
        <a routerLink="/sign-up" class="forgot-link">Forgot password?</a>
        <button 
          type="submit" 
          class="btn btn-primary btn-block"
          [disabled]="isLoading || formSignin.invalid">
          <span *ngIf="!isLoading">Sign in</span>
          <span *ngIf="isLoading">Signing in...</span>
        </button>
      </form>
      <p class="form-footer">
        Don't have an account? <a routerLink="/sign-up">Sign up</a>
      </p>
    </div>
    <div class="sign-in-visual">
      <div class="visual-content">
        <span class="visual-icon">🔐</span>
        <h2>Secure access</h2>
        <p>Your credentials are protected. Sign in to manage your APIs and keys.</p>
        <a routerLink="/sign-up" class="btn btn-outline-light">Create account</a>
      </div>
    </div>
  </div>
</div>
