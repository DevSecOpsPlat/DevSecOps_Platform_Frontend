<div class="sign-in-page">
  <div class="sign-in-container">
    <div class="sign-in-form-panel">
      <h1>Sign in</h1>
      <p class="form-subtitle">Welcome back. Sign in to your account.</p>
      <form class="auth-form">
        <div class="form-group">
          <label for="signin-email">Email or username</label>
          <input id="signin-email" type="text" placeholder="Email or username" />
        </div>
        <div class="form-group">
          <label for="signin-password">Password</label>
          <input id="signin-password" type="password" placeholder="Password" />
        </div>
        <a routerLink="/sign-up" class="forgot-link">Forgot password?</a>
        <button type="button" class="btn btn-primary btn-block">Sign in</button>
      </form>
      <p class="form-footer">
        Don't have an account? <a routerLink="/sign-up">Sign up</a>
      </p>
    </div>
    <div class="sign-in-visual">
      <div class="visual-content">
        <span class="visual-icon"><img src="assets/images/Logormbg.png" alt="Logo " /></span>
        <h2>Secure access</h2>
        <p>Your credentials are protected. Sign in to manage your APIs and keys.</p>
        <a routerLink="/sign-up" class="btn btn-outline-light">Create account</a>
      </div>
    </div>
  </div>
</div>
