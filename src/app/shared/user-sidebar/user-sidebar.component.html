<!-- user-sidebar.component.html -->
<aside class="user-sidebar" *ngIf="authService.isLoggedIn$ | async">
  <div class="sidebar-header">
    <div class="brand">
      <div class="brand-title">EnviroTest</div>
      <div class="brand-badge">beta</div>
    </div>
    <div class="brand-subtitle">On‑Demand Environments</div>
  </div>

  <!-- Barre de recherche -->
  <div class="sidebar-search">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Rechercher..." />
    <span class="search-shortcut">⌘K</span>
  </div>

  <nav class="sidebar-sections">
    <!-- Bloc application courante (si on est dans /project/:appId/...) -->
    <section class="sidebar-section" *ngIf="currentApp">
      <h3 class="section-label">
        <button class="back-link" (click)="backToApplications()">← Applications</button>
      </h3>
      <div class="current-app">
        <div class="current-app-name">{{ currentApp.name }}</div>
        <div class="current-app-repo">{{ currentApp.gitRepositoryUrl }}</div>
      </div>
    </section>

  

    <!-- Dashboard Section global -->
    <section class="sidebar-section">
      <h3 class="section-label">
        <span>📊 Dashboard</span>
        <span class="section-badge">3</span>
      </h3>
      <div class="nav-items">
        <button class="nav-item" (click)="navigate('/overview')" routerLinkActive="active">
          <span class="nav-dot"></span>
          <span class="nav-text">Vue d'ensemble</span>
          <span class="nav-badge">nouveau</span>
        </button>
        <button class="nav-item" (click)="navigate('/activity')">
          <span class="nav-dot"></span>
          <span class="nav-text">Activité récente</span>
          <span class="nav-time">5m</span>
        </button>
      </div>
    </section>

    <!-- Applications Section -->
    <section class="sidebar-section">
      <h3 class="section-label">
        <span>📁 Applications</span>
        <span class="section-badge">8</span>
      </h3>
      <div class="nav-items">
        <button class="nav-item" (click)="navigate('/my-applications')">
          <span class="nav-dot"></span>
          <span class="nav-text">Toutes</span>
          <span class="nav-count">8</span>
        </button>
        <button class="nav-item" (click)="navigate('/my-applications?active=true')">
          <span class="nav-dot" style="background: #10b981;"></span>
          <span class="nav-text">Actives</span>
          <span class="nav-count success">4</span>
        </button>
        <button class="nav-item create-button" (click)="navigate('/environment-create')">
          <span class="nav-icon">+</span>
          <span class="nav-text">Nouvelle application</span>
          <span class="nav-shortcut">⌘N</span>
        </button>
      </div>
    </section>

    <!-- Déploiements -->
    <section class="sidebar-section">
      <h3 class="section-label">
        <span>🔄 Déploiements</span>
      </h3>
      <div class="nav-items">
        <button class="nav-item" (click)="navigate('/deployments/active')">
          <span class="nav-indicator pulse success"></span>
          <span class="nav-text">En cours</span>
          <span class="nav-count warning">3</span>
        </button>
        <button class="nav-item" (click)="navigate('/deployments/history')">
          <span class="nav-dot"></span>
          <span class="nav-text">Historique</span>
          <span class="nav-count">24</span>
        </button>
      </div>
    </section>

    <!-- Pipelines pour l'application courante -->
    <section class="sidebar-section" *ngIf="currentAppId">
      <h3 class="section-label">
        <span>🚀 Pipelines</span>
      </h3>
      <div class="nav-items">
        <button class="nav-item" (click)="goToProjectPipelines()">
          <span class="nav-dot"></span>
          <span class="nav-text">Tous les pipelines</span>
        </button>
        <button class="nav-item" (click)="goToProjectPipelines('SUCCESS')">
          <span class="nav-dot" style="background: #10b981;"></span>
          <span class="nav-text">Réussis</span>
        </button>
        <button class="nav-item" (click)="goToProjectPipelines('FAILED')">
          <span class="nav-dot" style="background: #ef4444;"></span>
          <span class="nav-text">Échoués</span>
        </button>
        <button class="nav-item" (click)="goToProjectPipelines('PENDING')">
          <span class="nav-dot" style="background: #f59e0b;"></span>
          <span class="nav-text">En attente</span>
        </button>
        <button class="nav-item" (click)="goToLastPipeline()">
          <span class="nav-dot" style="background: #5c10b9;"></span>
          <span class="nav-text">Dernier Pipeline</span>
        </button>
      </div>
    </section>

    <!-- Sécurité -->
    <section class="sidebar-section">
      <h3 class="section-label">
        <span>🛡️ Sécurité</span>
        <span class="section-badge danger">5</span>
      </h3>
      <div class="nav-items">
        <button class="nav-item" (click)="navigate('/security/vulnerabilities')">
          <span class="nav-dot" style="background: #ef4444;"></span>
          <span class="nav-text">Vulnérabilités</span>
          <span class="nav-count danger">12</span>
        </button>
        <button class="nav-item" (click)="navigate('/security/scans')">
          <span class="nav-dot"></span>
          <span class="nav-text">Scans récents</span>
          <span class="nav-time">2h</span>
        </button>
        <button class="nav-item ai-suggestion" (click)="navigate('/security/fixes')">
          <span class="nav-icon">🤖</span>
          <span class="nav-text">Correctifs IA</span>
          <span class="nav-badge primary">3 dispo</span>
        </button>
      </div>
    </section>

    <!-- Environnements -->
    <section class="sidebar-section">
      <h3 class="section-label">
        <span>🌍 Environnements</span>
      </h3>
      <div class="nav-items">
        <button class="nav-item" (click)="navigate('/environments/active')">
          <span class="nav-indicator success"></span>
          <span class="nav-text">Actifs</span>
          <span class="nav-count success">5</span>
        </button>
        <button class="nav-item" (click)="navigate('/environments/expiring')">
          <span class="nav-indicator warning"></span>
          <span class="nav-text">Expiration imminente</span>
          <span class="nav-count warning">2</span>
        </button>
      </div>
    </section>

    <!-- Monitoring -->
    <section class="sidebar-section">
      <h3 class="section-label">
        <span>📊 Monitoring</span>
      </h3>
      <button class="nav-item" (click)="openGrafana()">
        <span class="nav-icon">📈</span>
        <span class="nav-text">Tableau de bord</span>
        <span class="nav-badge">live</span>
      </button>
    </section>

    <!-- Paramètres -->
    <section class="sidebar-section">
      <h3 class="section-label">⚙️ Paramètres</h3>
      <button class="nav-item" (click)="navigate('/profile')">
        <span class="nav-icon">👤</span>
        <span class="nav-text">Profil</span>
      </button>
      <button class="nav-item" (click)="navigate('/tokens')">
        <span class="nav-icon">🔑</span>
        <span class="nav-text">Tokens GitHub</span>
        <span class="nav-badge">2</span>
      </button>
    </section>
  </nav>

  <div class="sidebar-footer">
    <div class="user-profile" (click)="navigate('/profile')">
      <div class="user-avatar">
        {{ getUserInitials() }}
      </div>
      <div class="user-info">
        <div class="user-name">{{ authService.getCurrentUser()?.username || 'User' }}</div>
        <div class="user-email">{{ authService.getCurrentUser()?.email || 'user@example.com' }}</div>
      </div>
      <div class="user-status" [class.online]="isOnline"></div>
    </div>
    <button class="logout-button" (click)="logout()" title="Déconnexion">
      <span class="logout-icon">↪</span>
    </button>
  </div> -->
</aside>
