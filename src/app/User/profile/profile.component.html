<div class="profile-page">
  <div class="profile-header">
    <div class="header-content">
      <div class="profile-avatar">
        <img src="/assets/images/user.png" alt="Profile picture" class="avatar-image" />
        <span class="avatar-badge">✓</span>
      </div>
      <div class="header-info">
        <h1>{{ user?.username || 'Mon profil' }}</h1>
        <p class="profile-tagline">
          <span class="tag-item">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 0L10.472 5.528L16 8L10.472 10.472L8 16L5.528 10.472L0 8L5.528 5.528L8 0Z" fill="currentColor"/>
            </svg>
            Compte EnviroTest
          </span>
          <span class="tag-separator">•</span>
          <span class="tag-item">Attijari Bank</span>
        </p>
      </div>
    </div>
  </div>

  <div class="profile-container">
    <section class="profile-card" *ngIf="user">
      <div class="card-header">
        <h2 class="card-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Informations du compte
        </h2>
      </div>

      <div class="profile-grid">
        <div class="profile-field">
          <div class="field-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="field-content">
            <span class="field-label">Nom d'utilisateur</span>
            <span class="field-value">{{ user.username }}</span>
          </div>
        </div>

        <div class="profile-field" *ngIf="user.email">
          <div class="field-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <div class="field-content">
            <span class="field-label">Email</span>
            <span class="field-value">{{ user.email }}</span>
          </div>
        </div>

        <div class="profile-field">
          <div class="field-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
          </div>
          <div class="field-content">
            <span class="field-label">Statut du compte</span>
            <span class="field-value">
              <span class="status-badge status-active">
                <span class="status-dot"></span>
                Actif
              </span>
            </span>
          </div>
        </div>
      </div>

      <div class="profile-actions">
        <a routerLink="/environment-create" class="btn-profile btn-primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Créer un environnement
        </a>
        <a routerLink="/home" class="btn-profile btn-secondary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Retour à l'accueil
        </a>
      </div>
    </section>

    <!-- Quick Actions Card -->
    <aside class="quick-actions-card">
      <h3 class="quick-actions-title">Actions rapides</h3>
      <div class="quick-actions-grid">
        <button class="quick-action-item">
          <div class="quick-action-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </div>
          <span>Modifier le profil</span>
        </button>

        <button class="quick-action-item">
          <div class="quick-action-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <span>Sécurité</span>
        </button>

        <button class="quick-action-item">
          <div class="quick-action-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
            </svg>
          </div>
          <span>Paramètres</span>
        </button>

        <button class="quick-action-item">
          <div class="quick-action-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 16v-4M12 8h.01"/>
            </svg>
          </div>
          <span>Aide</span>
        </button>
      </div>
    </aside>
  </div>
</div>
